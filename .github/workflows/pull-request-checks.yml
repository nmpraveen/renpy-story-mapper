name: Pull request checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-checks:
    name: Deterministic checks (Python 3.12)
    runs-on: windows-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONHASHSEED: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install checks and project
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install -e ".[dev]"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Check changed whitespace
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          } else {
            git diff --check "${{ github.event.before }}..${{ github.sha }}"
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run deterministic release validation
        shell: pwsh
        run: .\scripts\validate.ps1 -Tier Release -NoTimeout
